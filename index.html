<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/styles/style.css">
    <link rel="shortcut icon" href="./assets/imgs/calculator-line.png" type="image/x-icon">
    <title>Calculator</title>
</head>
<body>
    <main class="main__container">
        <h1 class="calculator__title">Calc <span class="title__icon"><i class="ri-increase-decrease-line"></i></span></h1>
        <div class="calculator__container container grid">
            <section class="display__container container grid">
                <div class="display__data" id="display__data">0</div>
            </section>
            <section class="calculator__buttons container grid">
                <button data-action="operator--delete" class="calculator__button calculator__button--operator"><i class="ri-delete-back-2-line"></i></button>
                <button data-action="operator--clean" class="calculator__button calculator__button--operator">C</button>
                <button data-action="operator--percent" class="calculator__button calculator__button--operator"><i class="ri-percent-line"></i></button>
                <button data-action="operator--divide" class="calculator__button calculator__button--operator"><i class="ri-divide-line"></i></button>
                <button data-number="7" class="calculator__button">7</button>
                <button data-number="8" class="calculator__button">8</button>
                <button data-number="9" class="calculator__button">9</button>
                <button data-action="operator--multiply" class="calculator__button calculator__button--operator"><i class="ri-close-line"></i></button>
                <button data-number="4" class="calculator__button">4</button>
                <button data-number="5" class="calculator__button">5</button>
                <button data-number="6" class="calculator__button">6</button>
                <button data-action="operator--subtract" class="calculator__button calculator__button--operator"><i class="ri-subtract-line"></i></button>
                <button data-number="1" class="calculator__button">1</button>
                <button data-number="2" class="calculator__button">2</button>
                <button data-number="3" class="calculator__button">3</button>
                <button data-action="operator--add" class="calculator__button calculator__button--operator"><i class="ri-add-line"></i></button>
                <button data-number="0" class="calculator__button">0</button>
                <button data-action="." class="calculator__button">.</button>
                <button data-action="operator--equal" class="calculator__button calculator__button--operator"><i class="ri-menu-fill"></i></button>
            </section>
        </div>

        <footer></footer>
    </main>
    <script src="./assets/scripts/script.js"></script>
</body>
</html>
